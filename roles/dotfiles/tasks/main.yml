---
# roles/dotfiles/tasks/main.yml
# Deploy configuration files (copy + template), OS-conditional.

- name: Install oh-my-zsh
  ansible.builtin.git:
    repo: https://github.com/ohmyzsh/ohmyzsh.git
    dest: "{{ ansible_user_dir }}/.oh-my-zsh"
    depth: 1
    version: "70ad5e3df8f7bed68aa6672029496926e632aedd"
    update: false

- name: Ensure macOS SSH sockets directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.ssh/sockets"
    state: directory
    mode: "0700"
  when: ansible_system != 'Linux'

- name: Ensure Linux-only config directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ansible_user_dir }}/.config/user-tmpfiles.d"
    - "{{ ansible_user_dir }}/.config/environment.d"
    - "{{ ansible_user_dir }}/.config/systemd/user"
  when: ansible_system == 'Linux'

- name: Ensure private directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0700"
  loop:
    - "{{ ansible_user_dir }}/.local/run/tmux"

- name: Ensure Claude config directory
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/claude"
    state: directory
    mode: "0700"

- name: Deploy zshrc
  ansible.builtin.template:
    src: zshrc.j2
    dest: "{{ ansible_user_dir }}/.zshrc"
    mode: "0644"

- name: Deploy gitconfig
  ansible.builtin.template:
    src: gitconfig.j2
    dest: "{{ ansible_user_dir }}/.gitconfig"
    mode: "0644"

- name: Deploy gitleaks pre-commit hook
  ansible.builtin.copy:
    dest: "{{ ansible_user_dir }}/.config/git/template/hooks/pre-commit"
    mode: "0755"
    content: |
      #!/bin/sh
      if command -v gitleaks >/dev/null 2>&1; then
        gitleaks git --pre-commit --staged --redact --max-decode-depth 2
      fi

- name: Ensure gh config directory
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/gh"
    state: directory
    mode: "0700"

- name: Check if gh config exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.config/gh/config.yml"
  register: dotfiles_gh_config

- name: Deploy gh CLI config
  ansible.builtin.copy:
    content: |
      git_protocol: https
      editor: vim
      prompt: enabled
      aliases:
        co: pr checkout
    dest: "{{ ansible_user_dir }}/.config/gh/config.yml"
    mode: "0600"
  when: not dotfiles_gh_config.stat.exists

- name: Deploy git conditional includes
  ansible.builtin.template:
    src: "{{ item }}.j2"
    dest: "{{ ansible_user_dir }}/.config/git/{{ item }}"
    mode: "0644"
  loop:
    - config-work
    - config-personal

- name: Deploy tmux.conf
  ansible.builtin.template:
    src: tmux.conf.j2
    dest: "{{ ansible_user_dir }}/.tmux.conf"
    mode: "0644"

- name: Deploy vimrc
  ansible.builtin.template:
    src: vimrc.j2
    dest: "{{ ansible_user_dir }}/.vimrc"
    mode: "0644"

- name: Deploy bashrc
  ansible.builtin.template:
    src: bashrc.j2
    dest: "{{ ansible_user_dir }}/.bashrc"
    mode: "0644"

- name: Deploy SSH agent systemd user service
  ansible.builtin.template:
    src: ssh-agent.service.j2
    dest: "{{ ansible_user_dir }}/.config/systemd/user/ssh-agent.service"
    mode: "0644"
  when: ansible_system == 'Linux'

- name: Enable SSH agent user service
  ansible.builtin.systemd:
    name: ssh-agent
    scope: user
    state: started
    enabled: true
    daemon_reload: true
  when: ansible_system == 'Linux'
  failed_when: false

- name: Deploy SSH agent environment.d config
  ansible.builtin.copy:
    content: "SSH_AUTH_SOCK=${XDG_RUNTIME_DIR}/ssh-agent.socket\n"
    dest: "{{ ansible_user_dir }}/.config/environment.d/ssh-agent.conf"
    mode: "0644"
  when: ansible_system == 'Linux'

# --- macOS: SSH agent via launchd ---
- name: Disable Apple built-in ssh-agent (macOS)  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: "launchctl disable user/{{ ansible_user_uid }}/com.openssh.ssh-agent"
  changed_when: false
  failed_when: false
  when: ansible_os_family == 'Darwin'

- name: Ensure log directory exists (macOS)
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.local/share/log"
    state: directory
    mode: "0755"
  when: ansible_os_family == 'Darwin'

- name: Deploy SSH agent launchd plist (macOS)
  ansible.builtin.template:
    src: ssh-agent.plist.j2
    dest: "{{ ansible_user_dir }}/Library/LaunchAgents/com.dfarrell07.ssh-agent.plist"
    mode: "0644"
  when: ansible_os_family == 'Darwin'

- name: Load SSH agent launchd plist (macOS)  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: "launchctl load -w {{ ansible_user_dir }}/Library/LaunchAgents/com.dfarrell07.ssh-agent.plist"
  when: ansible_os_family == 'Darwin'
  changed_when: false
  failed_when: false

- name: Check if SSH supports post-quantum KEX
  ansible.builtin.command: ssh -Q kex
  register: dotfiles_ssh_kex_check
  changed_when: false
  failed_when: false

- name: Set PQ KEX availability fact
  ansible.builtin.set_fact:
    dotfiles_ssh_kex_pq_enabled: "{{ 'mlkem768x25519-sha256' in (dotfiles_ssh_kex_check.stdout | default('')) }}"

- name: Deploy SSH client config
  ansible.builtin.template:
    src: ssh_config.j2
    dest: "{{ ansible_user_dir }}/.ssh/config"
    mode: "0600"

- name: Deploy SSH socket tmpfiles config
  ansible.builtin.copy:
    content: "d %t/ssh 0700 - - -\n"
    dest: "{{ ansible_user_dir }}/.config/user-tmpfiles.d/ssh-sockets.conf"
    mode: "0644"
  when: ansible_system == 'Linux'

- name: Activate tmpfiles to create SSH socket directory
  ansible.builtin.command:
    cmd: systemd-tmpfiles --user --create
  changed_when: false
  when: ansible_system == 'Linux'

- name: Ensure direnv config directory
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.config/direnv"
    state: directory
    mode: "0755"

- name: Deploy safe direnv config
  ansible.builtin.copy:
    content: |
      [global]
      strict_env = true
      disable_stdin = true
      warn_timeout = "10s"
    dest: "{{ ansible_user_dir }}/.config/direnv/direnv.toml"
    mode: "0644"

- name: Set .npmrc permissions if exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.npmrc"
    mode: "0600"
  failed_when: false

- name: Harden credential directory permissions
  ansible.builtin.file:
    path: "{{ item }}"
    mode: "0700"
  loop:
    - "{{ ansible_user_dir }}/.aws"
    - "{{ ansible_user_dir }}/.config/gcloud"
    - "{{ ansible_user_dir }}/.kube"
  failed_when: false

- name: Deploy Claude work-env file
  ansible.builtin.copy:
    content: |
      export CLAUDE_CONFIG_DIR=~/.claude-work
      export CLAUDE_CODE_USE_VERTEX=1
      # Vertex project vars — set in CLAUDE.local.md, not here
    dest: "{{ ansible_user_dir }}/.config/claude/work-env"
    mode: "0600"
  when: profile == 'work'
