---
- name: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: true

- name: Reload firewalld
  ansible.builtin.command:
    cmd: firewall-cmd --reload
  changed_when: true

- name: Restart tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    state: restarted
  failed_when: false

- name: Restart auditd  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: service auditd restart
  changed_when: true

- name: Restart usbguard
  ansible.builtin.systemd:
    name: usbguard
    state: restarted
  failed_when: false

- name: Restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted

- name: Reload NetworkManager
  ansible.builtin.systemd:
    name: NetworkManager
    state: reloaded
  failed_when: false

- name: Restart systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted
  failed_when: false

- name: Restart logind  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: systemctl kill --signal=HUP systemd-logind
  changed_when: true

- name: Restart chronyd
  ansible.builtin.systemd:
    name: chronyd
    state: restarted

- name: Restart dnf-automatic timer
  ansible.builtin.systemd:
    name: "{{ 'dnf5-automatic.timer' if ansible_pkg_mgr == 'dnf5' else 'dnf-automatic.timer' }}"
    state: restarted
  failed_when: false
