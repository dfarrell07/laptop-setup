---
- name: Reload sysctl
  ansible.builtin.command:
    cmd: sysctl --system
  changed_when: true

- name: Reload firewalld
  ansible.builtin.command:
    cmd: firewall-cmd --reload
  changed_when: true

- name: Restart tailscaled
  ansible.builtin.systemd:
    name: tailscaled
    state: restarted
  failed_when: false

- name: Restart auditd  # noqa: command-instead-of-module
  ansible.builtin.command:
    cmd: service auditd restart
  changed_when: true

- name: Restart systemd-resolved
  ansible.builtin.systemd:
    name: systemd-resolved
    state: restarted

- name: Restart logind
  ansible.builtin.systemd:
    name: systemd-logind
    state: restarted
