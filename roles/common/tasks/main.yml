---
# roles/common/tasks/main.yml
# OS detection, CSB detection, prerequisite directories.

- name: Set project root for include paths
  ansible.builtin.set_fact:
    common_project_root: >-
      {{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY')
         | default(playbook_dir, true) }}

- name: Run CSB detection
  ansible.builtin.include_tasks: "{{ common_project_root }}/common/tasks/csb_detect.yml"
  when: ansible_system == 'Linux'

- name: Ensure prerequisite directories exist
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - "{{ ansible_user_dir }}/.config/git"
    - "{{ ansible_user_dir }}/.config/git/template/hooks"
    - "{{ ansible_user_dir }}/.local/bin"
    - "{{ ansible_user_dir }}/.local/share"
    - "{{ ansible_user_dir }}/bin"
