---
claude_install_method: native  # native (recommended) or npm (deprecated)
claude_install_url: "https://claude.ai/install.sh"

claude_work_config_dir: "{{ ansible_user_dir }}/.claude-work"
claude_personal_config_dir: "{{ ansible_user_dir }}/.claude-personal"

claude_telemetry_env:
  DISABLE_ERROR_REPORTING: "1"
  DISABLE_FEEDBACK_COMMAND: "1"
  # Do NOT set DISABLE_TELEMETRY — breaks feature flags (Opus 1M context)
  # Do NOT set CLAUDE_CODE_DISABLE_NONESSENTIAL_TRAFFIC — same + disables updater

claude_sandbox_config:
  enabled: true
  allowUnsandboxedCommands: false
  failIfUnavailable: true
  enableWeakerNestedSandbox: true

claude_cleanup_period_days: 7

claude_queue_enabled: false
claude_queue_repo: ""
claude_remote_control_enabled: false

claude_deny_read:
  - "~/.ssh/**"
  - "~/.aws/**"
  - "~/.gnupg/**"
  - "~/.kube/**"
  - "~/.config/gh/**"
  - "~/.config/gcloud/**"
  - "~/.config/acli/**"
  - "~/.config/containers/auth.json"
  - "~/.docker/config.json"
  - "~/.local/share/keyrings/**"
  - "~/.claude-work/**"
  - "~/.claude-personal/**"
  - "~/.claude/.credentials.json"
  - "~/.vault_pass*"
  - "~/.netrc"
  - "~/.npmrc"
  - "**/.env"
  - "**/.git/config"
  - "/proc/*/environ"
  - "/proc/*/cmdline"
  - "~/.password-store/**"
  - "~/.mozilla/**"
  - "~/.config/google-chrome/**"
  - "~/.config/chromium/**"
  - "~/.pki/**"
  - "~/.local/share/gnome-keyring/**"
  - "~/.Xauthority"
  - "~/.zsh_history"
  - "~/.bash_history"
  - "//run/host/**"

claude_deny_write:
  - "~/.ssh/**"
  - "~/.aws/**"
  - "~/.gnupg/**"
  - "~/.kube/**"
  - "~/.config/gh/**"
  - "~/.config/gcloud/**"
  - "~/.config/acli/**"
  - "~/.config/containers/auth.json"
  - "~/.docker/config.json"
  - "~/.local/share/keyrings/**"
  - "~/.claude-work/**"
  - "~/.claude-personal/**"
  - "~/.claude/.credentials.json"
  - "~/.claude/settings.json"
  - "~/.claude/settings.local.json"
  - "~/.vault_pass*"
  - "~/.netrc"
  - "~/.npmrc"
  - "**/.env"
  - "**/.git/config"
  - "~/.password-store/**"
  - "~/.mozilla/**"
  - "~/.config/google-chrome/**"
  - "~/.config/chromium/**"
  - "~/.pki/**"
  - "~/.local/share/gnome-keyring/**"
  - "~/.Xauthority"
  - "~/.zsh_history"
  - "~/.bash_history"
  - "//run/host/**"
