---
# roles/ssh/tasks/main.yml
# Deploy SSH keys from vault + pre-seed known_hosts.

- name: Ensure SSH directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.ssh"
    state: directory
    mode: "0700"

- name: Fetch GitHub SSH host keys from API
  ansible.builtin.uri:
    url: "{{ ssh_github_known_hosts_url }}"
    return_content: true
  register: ssh_github_meta
  changed_when: false

- name: Pre-seed GitHub known_hosts
  ansible.builtin.known_hosts:
    name: github.com
    key: "github.com {{ item }}"
    state: present
  loop: "{{ (ssh_github_meta.json.ssh_keys | default([])) }}"

- name: Hash known_hosts hostnames
  ansible.builtin.command:
    cmd: "ssh-keygen -H -f {{ ansible_user_dir }}/.ssh/known_hosts"
  changed_when: false
  failed_when: false

- name: Remove known_hosts backup
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.ssh/known_hosts.old"
    state: absent

