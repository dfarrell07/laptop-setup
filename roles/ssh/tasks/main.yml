---
# roles/ssh/tasks/main.yml
# Deploy SSH keys from vault + pre-seed known_hosts.

- name: Ensure SSH directory exists
  ansible.builtin.file:
    path: "{{ ansible_user_dir }}/.ssh"
    state: directory
    mode: "0700"

- name: Fetch GitHub SSH host keys from API
  ansible.builtin.uri:
    url: "{{ ssh_github_known_hosts_url }}"
    return_content: true
  register: ssh_github_meta
  changed_when: false
  failed_when: false

- name: Pre-seed GitHub known_hosts
  ansible.builtin.known_hosts:
    name: github.com
    key: "github.com {{ item }}"
    state: present
    hash_host: true
  loop: "{{ (ssh_github_meta.json.ssh_keys | default([])) }}"
  when: ssh_github_meta.status | default(0) == 200

- name: Deploy SSH auth key
  ansible.builtin.copy:
    content: "{{ ssh_auth_key }}"
    dest: "{{ ansible_user_dir }}/.ssh/id_ed25519_sk"
    mode: "0600"
  no_log: true
  when: ssh_auth_key | default('') | length > 0

- name: Deploy SSH auth public key
  ansible.builtin.copy:
    content: "{{ ssh_auth_key_pub }}"
    dest: "{{ ansible_user_dir }}/.ssh/id_ed25519_sk.pub"
    mode: "0644"
  no_log: true
  when: ssh_auth_key_pub | default('') | length > 0

- name: Deploy SSH signing key
  ansible.builtin.copy:
    content: "{{ ssh_signing_key }}"
    dest: "{{ ansible_user_dir }}/.ssh/id_ed25519_sk_signing"
    mode: "0600"
  no_log: true
  when: ssh_signing_key | default('') | length > 0

- name: Deploy SSH signing public key
  ansible.builtin.copy:
    content: "{{ ssh_signing_key_pub }}"
    dest: "{{ ansible_user_dir }}/.ssh/id_ed25519_sk_signing.pub"
    mode: "0644"
  no_log: true
  when: ssh_signing_key_pub | default('') | length > 0

- name: Deploy Red Hat internal git key
  ansible.builtin.copy:
    content: "{{ rh_git_key }}"
    dest: "{{ ansible_user_dir }}/.ssh/id_rsa_redhat"
    mode: "0600"
  no_log: true
  when:
    - rh_git_key | default('') | length > 0
    - profile == 'work'

- name: Deploy allowed signers file
  ansible.builtin.template:
    src: allowed_signers.j2
    dest: "{{ ansible_user_dir }}/.config/git/allowed_signers"
    mode: "0644"
  when: ssh_git_signing_pubkey | default('') | length > 0
