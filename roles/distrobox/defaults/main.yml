---
distrobox_container_name: "{{ container_name | default('fedora-dev') }}"
distrobox_container_image: "{{ container_image | default('registry.fedoraproject.org/fedora-toolbox:43') }}"
distrobox_container_replace: "{{ container_replace | default(false) }}"

distrobox_ini_path: "{{ ansible_user_dir }}/.config/distrobox/distrobox.ini"

distrobox_packages:
  - git
  - vim
  - tmux
  - zsh
  - fzf
  - direnv
  - jq
  - curl
  - wget
  - tar
  - unzip
  - gcc
  - gcc-c++
  - clang
  - make
  - cmake
  - autoconf
  - automake
  - libtool
  - golang
  - python3
  - python3-pip
  - python3-devel
  - nodejs
  - npm
  - openssl-devel
  - libffi-devel
  - zlib-devel
  - ShellCheck
  - yamllint
  - ripgrep
  - fd-find
  - buildah
  - skopeo
  - zoxide
  - shfmt
  - procps-ng
  - findutils
  - which
  - hostname
  - bash-completion
  - tcpdump
  - iproute
  - nmap-ncat
  - bind-utils
  - traceroute
  - ovn
  - openvswitch

distrobox_host_exec_commands:
  - podman
  - docker
  - flatpak

distrobox_exports:
  - /usr/bin/jq
  - /usr/bin/vim
  - /usr/local/bin/oc
  - /usr/local/bin/kubectl

# Binary versions for container provisioning (Play 3)
distrobox_oc_version: "stable"

# kind host prerequisites
distrobox_kind_log_driver: "k8s-file"
distrobox_kind_pids_limit: 65536
