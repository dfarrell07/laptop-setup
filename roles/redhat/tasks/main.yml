---
# roles/redhat/tasks/main.yml
# Red Hat-specific: CA certs, VPN. Work profile only.

- name: Check for Red Hat CA certificate files
  ansible.builtin.stat:
    path: "{{ role_path }}/files/{{ item }}"
  loop: "{{ redhat_ca_certs }}"
  register: redhat_ca_stat

- name: Deploy Red Hat CA certificates
  ansible.builtin.copy:
    src: "{{ item.item }}"
    dest: "{{ redhat_ca_dest }}/{{ item.item }}"
    mode: "0644"
  loop: "{{ redhat_ca_stat.results }}"
  loop_control:
    label: "{{ item.item }}"
  become: true
  tags: [become]
  notify: Update CA trust
  when:
    - ansible_system == 'Linux'
    - item.stat.exists

- name: Install VPN packages
  ansible.builtin.dnf:
    name: "{{ redhat_vpn_packages }}"
    state: present
  become: true
  tags: [become]
  when: ansible_pkg_mgr in ['dnf', 'dnf5']
  failed_when: false
