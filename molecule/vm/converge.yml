---
- name: Converge — System setup (VM)
  hosts: all
  become: true
  gather_facts: true

  pre_tasks:
    - name: Capture real user identity
      ansible.builtin.set_fact:
        real_user_home: "{{ ansible_user_dir }}"
        real_user_id: "{{ ansible_user_id }}"
      become: false

    - name: Load configuration
      ansible.builtin.include_vars: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/default.config.yml"

    - name: Override profile
      ansible.builtin.set_fact:
        profile: personal

    - name: Set project root for include paths
      ansible.builtin.set_fact:
        common_project_root: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}"

    - name: Gather service facts
      ansible.builtin.service_facts:

  roles:
    - role: repos_dnf
      when: ansible_pkg_mgr in ['dnf', 'dnf5']
    - role: system

- name: Converge — User setup (VM)
  hosts: all
  become: false
  gather_facts: true

  pre_tasks:
    - name: Load configuration
      ansible.builtin.include_vars: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/default.config.yml"

    - name: Override profile
      ansible.builtin.set_fact:
        profile: personal

  roles:
    - role: common
    - role: dotfiles
    - role: packages
    - role: ssh
    - role: git_repos
    - role: notes
      vars:
        notes_transcrypt_password: ""
    - role: containers
    - role: desktop
      vars:
        desktop_environment: 'unknown'
        desktop_common_packages: []
        desktop_sway_packages: []
        desktop_i3_packages: []
    - role: claude
      vars:
        claude_install_method: skip
