---
- name: Verify (VM)
  hosts: all
  gather_facts: true
  become: false

  tasks:
    # --- Shared assertions (all platforms) ---
    - name: Include common verify assertions
      ansible.builtin.include_tasks: ../shared/verify-common.yml

    # --- Shared assertions (dnf platforms) ---
    - name: Include dnf verify assertions
      ansible.builtin.include_tasks: ../shared/verify-dnf.yml

    # --- repos_dnf checks ---
    - name: Verify gh-cli repo configured
      ansible.builtin.stat:
        path: /etc/yum.repos.d/gh-cli.repo
      register: verify_gh_repo
      become: true

    - name: Assert gh-cli repo exists
      ansible.builtin.assert:
        that: verify_gh_repo.stat.exists
        fail_msg: "gh-cli repo not configured"

    - name: Verify sysctl hardening config deployed
      ansible.builtin.stat:
        path: /etc/sysctl.d/90-hardening.conf
      register: verify_sysctl
      become: true

    - name: Assert sysctl hardening deployed
      ansible.builtin.assert:
        that: verify_sysctl.stat.exists
        fail_msg: "Sysctl hardening config not deployed"

    - name: Verify modprobe hardening config deployed
      ansible.builtin.stat:
        path: /etc/modprobe.d/hardening.conf
      register: verify_modprobe
      become: true

    - name: Assert modprobe hardening deployed
      ansible.builtin.assert:
        that: verify_modprobe.stat.exists
        fail_msg: "Modprobe hardening config not deployed"

    # --- System hardening checks (VM only) ---
    - name: Gather service facts for conditional checks
      ansible.builtin.service_facts:
      become: true

    - name: Check firewall default zone
      ansible.builtin.command: firewall-cmd --get-default-zone
      register: verify_fw_zone
      changed_when: false
      become: true

    - name: Assert firewall default zone is drop
      ansible.builtin.assert:
        that: verify_fw_zone.stdout == 'drop'
        fail_msg: "Firewall default zone is '{{ verify_fw_zone.stdout }}', expected 'drop'"

    - name: Check sysctl net.core.bpf_jit_harden
      ansible.builtin.command: sysctl -n net.core.bpf_jit_harden
      register: verify_bpf
      changed_when: false
      become: true

    - name: Assert BPF JIT hardening
      ansible.builtin.assert:
        that: verify_bpf.stdout == '2'
        fail_msg: "BPF JIT hardening not set to 2"

    - name: Check sysctl net.ipv4.conf.all.rp_filter
      ansible.builtin.command: sysctl -n net.ipv4.conf.all.rp_filter
      register: verify_rp_filter
      changed_when: false
      become: true

    - name: Assert reverse path filtering
      ansible.builtin.assert:
        that: verify_rp_filter.stdout == '1'
        fail_msg: "Reverse path filtering not set to strict mode"

    - name: Verify auditd rules file exists
      ansible.builtin.stat:
        path: /etc/audit/rules.d/claude-code.rules
      register: verify_auditd
      become: true

    - name: Assert auditd rules deployed
      ansible.builtin.assert:
        that: verify_auditd.stat.exists
        fail_msg: "Auditd rules not deployed"
      when: ansible_facts.services['auditd.service'] is defined

    - name: Verify DNS-over-TLS config exists
      ansible.builtin.stat:
        path: /etc/systemd/resolved.conf.d/99-dot.conf
      register: verify_dot
      become: true

    - name: Assert DNS-over-TLS config deployed
      ansible.builtin.assert:
        that: verify_dot.stat.exists
        fail_msg: "DNS-over-TLS config not deployed"
      when: ansible_facts.services['systemd-resolved.service'] is defined

    - name: Verify kernel lockdown in grubby
      ansible.builtin.command: grubby --info=DEFAULT
      register: verify_lockdown
      changed_when: false
      become: true
      failed_when: false

    - name: Assert kernel lockdown integrity
      ansible.builtin.assert:
        that: "'lockdown=integrity' in verify_lockdown.stdout"
        fail_msg: "Kernel lockdown=integrity not found in boot args"
      when: verify_lockdown.rc == 0

    - name: Verify sshd hardening config
      ansible.builtin.stat:
        path: /etc/ssh/sshd_config.d/00-hardening.conf
      register: verify_sshd
      become: true

    - name: Assert sshd hardening deployed
      ansible.builtin.assert:
        that: verify_sshd.stat.exists
        fail_msg: "SSHD hardening config not deployed"

    - name: Verify crypto-policy
      ansible.builtin.command: update-crypto-policies --show
      register: verify_crypto
      changed_when: false
      become: true
      failed_when: false

    - name: Assert crypto-policy is DEFAULT:NO-SHA1
      ansible.builtin.assert:
        that: verify_crypto.stdout == 'DEFAULT:NO-SHA1'
        fail_msg: "Crypto policy is '{{ verify_crypto.stdout }}', expected DEFAULT:NO-SHA1"
      when: verify_crypto.rc == 0

    - name: Verify NetworkManager Tailscale config
      ansible.builtin.stat:
        path: /etc/NetworkManager/conf.d/tailscale.conf
      register: verify_nm_ts
      become: true

    - name: Assert Tailscale NM unmanaged config deployed
      ansible.builtin.assert:
        that: verify_nm_ts.stat.exists
        fail_msg: "NetworkManager Tailscale config not deployed"

    # --- New system hardening checks ---
    - name: Check /dev/shm mount options
      ansible.builtin.command: findmnt -n -o OPTIONS /dev/shm
      register: verify_shm
      changed_when: false
      become: true

    - name: Assert /dev/shm has noexec
      ansible.builtin.assert:
        that: "'noexec' in verify_shm.stdout"
        fail_msg: "/dev/shm missing noexec mount option"

    - name: Verify modprobe blacklists usb_storage
      ansible.builtin.command: grep -q usb_storage /etc/modprobe.d/hardening.conf
      changed_when: false
      failed_when: false
      register: verify_usb_storage
      become: true

    - name: Assert usb_storage is blacklisted
      ansible.builtin.assert:
        that: verify_usb_storage.rc == 0
        fail_msg: "usb_storage not blacklisted"

    - name: Verify chrony NTS config
      ansible.builtin.command: grep -q nts /etc/chrony.conf
      changed_when: false
      failed_when: false
      register: verify_chrony_nts
      become: true

    - name: Assert chrony has NTS config
      ansible.builtin.assert:
        that: verify_chrony_nts.rc == 0
        fail_msg: "NTS not configured in chrony.conf"

    - name: Verify chronyd is enabled
      ansible.builtin.systemd:
        name: chronyd
      register: verify_chronyd
      become: true

    - name: Assert chronyd is enabled
      ansible.builtin.assert:
        that: verify_chronyd.status.UnitFileState == 'enabled'
        fail_msg: "chronyd not enabled"

    - name: Check pam_wheel.so in /etc/pam.d/su
      ansible.builtin.command: grep -qE '^auth.*required.*pam_wheel.so' /etc/pam.d/su
      changed_when: false
      become: true

    - name: Check root account locked
      ansible.builtin.command: passwd -S root
      register: verify_root_lock
      changed_when: false
      become: true

    - name: Assert root account is locked
      ansible.builtin.assert:
        that: "'LK' in verify_root_lock.stdout or 'L ' in verify_root_lock.stdout"
        fail_msg: "Root account is not locked"

    - name: Verify AIDE timer enabled
      ansible.builtin.systemd:
        name: aide-check.timer
      register: verify_aide_timer
      become: true

    - name: Assert AIDE timer is enabled
      ansible.builtin.assert:
        that: verify_aide_timer.status.UnitFileState == 'enabled'
        fail_msg: "AIDE check timer not enabled"
