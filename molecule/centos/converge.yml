---
- name: Converge (CentOS Stream)
  hosts: all
  gather_facts: true

  vars:
    profile: work
    # Subset of packages_cli — direnv, zoxide, shfmt, procps-ng not in Rocky 10 repos
    packages_cli:
      - git
      - make
      - curl
      - tree
      - htop
      - tmux
      - mosh
      - jq
      - nmap
      - vim
      - zsh
      - fzf
      - socat
      - pipx
      - ShellCheck
    packages_languages:
      - golang
      - python3
      - python3-pip
      - gcc
      - gcc-c++
    packages_security: []
    packages_containers: []
    packages_networking: []
    packages_install_binaries: false
    install_virtualization: false

  pre_tasks:
    - name: Load configuration
      ansible.builtin.include_vars: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/default.config.yml"

    - name: Override profile
      ansible.builtin.set_fact:
        profile: work

  roles:
    - role: common
    - role: packages
    - role: dotfiles
    - role: ssh
    - role: git_repos
    - role: containers
    - role: desktop
      vars:
        desktop_environment: 'unknown'
        desktop_common_packages: []
        desktop_sway_packages: []
        desktop_i3_packages: []
    - role: redhat
    - role: claude
      vars:
        claude_install_method: skip
