---
driver:
  name: podman

platforms:
  - name: centos-test
    # To update digest: podman pull docker.io/geerlingguy/docker-rockylinux10-ansible:latest
    # then: podman inspect --format='{{.Digest}}' docker.io/geerlingguy/docker-rockylinux10-ansible:latest
    image: docker.io/geerlingguy/docker-rockylinux10-ansible@sha256:d2e39f28fe5bdc26f314cfda02cbd1a6f0b70b785d73b554510b02d374dd7d58
    pre_build_image: true
    privileged: true
    command: /usr/sbin/init

provisioner:
  name: ansible
  env:
    ANSIBLE_VAULT_PASSWORD_FILE: ${MOLECULE_PROJECT_DIRECTORY}/scripts/vault-pass-ci.sh
    ANSIBLE_COLLECTIONS_PATH: ${MOLECULE_PROJECT_DIRECTORY}/collections:~/.ansible/collections:/usr/share/ansible/collections
  config_options:
    defaults:
      vault_password_file: ${MOLECULE_PROJECT_DIRECTORY}/scripts/vault-pass-ci.sh
      roles_path: ${MOLECULE_PROJECT_DIRECTORY}/roles

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - cleanup
    - destroy
