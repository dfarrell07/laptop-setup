---
- name: Verify (CentOS Stream)
  hosts: all
  gather_facts: true

  tasks:
    - name: Check git is installed
      ansible.builtin.command: git --version
      changed_when: false

    - name: Check zsh is installed
      ansible.builtin.command: zsh --version
      changed_when: false

    - name: Check tmux is installed
      ansible.builtin.command: tmux -V
      changed_when: false

    - name: Check jq is installed
      ansible.builtin.command: jq --version
      changed_when: false

    - name: Verify .zshrc exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.zshrc"
      register: verify_zshrc

    - name: Assert .zshrc exists
      ansible.builtin.assert:
        that: verify_zshrc.stat.exists
        fail_msg: ".zshrc was not deployed"

    - name: Verify .gitconfig exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.gitconfig"
      register: verify_gitconfig

    - name: Assert .gitconfig exists
      ansible.builtin.assert:
        that: verify_gitconfig.stat.exists
        fail_msg: ".gitconfig was not deployed"

    - name: Verify .tmux.conf exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.tmux.conf"
      register: verify_tmux

    - name: Assert .tmux.conf exists
      ansible.builtin.assert:
        that: verify_tmux.stat.exists
        fail_msg: ".tmux.conf was not deployed"

    - name: Verify SSH config exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.ssh/config"
      register: verify_ssh_config

    - name: Assert SSH config exists
      ansible.builtin.assert:
        that: verify_ssh_config.stat.exists
        fail_msg: "SSH config was not deployed"

    - name: Verify git repos base directory exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/src"
      register: verify_repos_dir

    - name: Assert git repos base directory exists
      ansible.builtin.assert:
        that: verify_repos_dir.stat.isdir
        fail_msg: "Git repos base directory ~/src was not created"

    - name: Verify containers config directory
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.config/containers"
      register: verify_containers_dir

    - name: Assert containers config directory exists
      ansible.builtin.assert:
        that: verify_containers_dir.stat.isdir
        fail_msg: "Containers config directory was not created"

    - name: Verify Claude personal config directory
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.claude-personal"
      register: verify_claude_dir

    - name: Assert Claude config directory exists
      ansible.builtin.assert:
        that:
          - verify_claude_dir.stat.isdir
          - verify_claude_dir.stat.mode == '0700'
        fail_msg: "Claude personal config dir missing or wrong permissions"

    - name: Check git core.fsmonitor setting
      ansible.builtin.command: git config --global core.fsmonitor
      register: verify_fsmonitor
      changed_when: false

    - name: Assert git core.fsmonitor is false
      ansible.builtin.assert:
        that: verify_fsmonitor.stdout == 'false'
        fail_msg: "git core.fsmonitor is not set to false"

    - name: Check git safe.bareRepository setting
      ansible.builtin.command: git config --global safe.bareRepository
      register: verify_bare_repo
      changed_when: false

    - name: Assert git safe.bareRepository is explicit
      ansible.builtin.assert:
        that: verify_bare_repo.stdout == 'explicit'
        fail_msg: "git safe.bareRepository is not set to explicit"

    # --- Work profile checks ---
    - name: Verify Claude work config directory
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.claude-work"
      register: verify_claude_work

    - name: Assert Claude work config directory exists
      ansible.builtin.assert:
        that:
          - verify_claude_work.stat.isdir
          - verify_claude_work.stat.mode == '0700'
        fail_msg: "Claude work config dir missing or wrong permissions"

    - name: Check git user.email is work email
      ansible.builtin.command: git config --global user.email
      register: verify_git_email
      changed_when: false

    - name: Assert git email is work profile
      ansible.builtin.assert:
        that: "'redhat.com' in verify_git_email.stdout"
        fail_msg: "git user.email is not set to a Red Hat work address"

    - name: Verify SSH config permissions
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.ssh/config"
      register: verify_ssh_perms

    - name: Assert SSH config is 0600
      ansible.builtin.assert:
        that: verify_ssh_perms.stat.mode == '0600'
        fail_msg: "SSH config has wrong permissions (expected 0600)"

    - name: Verify Claude CLAUDE.md exists (work)
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.claude-work/CLAUDE.md"
      register: verify_claude_md_work

    - name: Assert Claude CLAUDE.md exists (work)
      ansible.builtin.assert:
        that: verify_claude_md_work.stat.exists
        fail_msg: "Claude CLAUDE.md not deployed (work profile)"

    - name: Verify bashrc exists
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.bashrc"
      register: verify_bashrc

    - name: Assert bashrc exists
      ansible.builtin.assert:
        that: verify_bashrc.stat.exists
        fail_msg: ".bashrc was not deployed"

    - name: Check git core.hooksPath
      ansible.builtin.command: git config --global core.hooksPath
      register: verify_hooks_path
      changed_when: false

    - name: Assert core.hooksPath is set
      ansible.builtin.assert:
        that: "'hooks' in verify_hooks_path.stdout"
        fail_msg: "git core.hooksPath not configured"

    # --- Desktop role ---
    - name: Verify Alacritty config deployed
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.config/alacritty/alacritty.toml"
      register: verify_alacritty

    - name: Assert Alacritty config exists
      ansible.builtin.assert:
        that: verify_alacritty.stat.exists
        fail_msg: "Alacritty config not deployed"

    - name: Verify Chrome policy deployed
      ansible.builtin.stat:
        path: /etc/opt/chrome/policies/managed/security.json
      register: verify_chrome

    - name: Assert Chrome policy exists
      ansible.builtin.assert:
        that: verify_chrome.stat.exists
        fail_msg: "Chrome security policy not deployed"

    # --- Redhat role ---
    - name: Verify Red Hat CA cert deployed
      ansible.builtin.stat:
        path: /etc/pki/ca-trust/source/anchors/2022-IT-Root-CA.pem
      register: verify_rh_cert

    - name: Assert Red Hat CA cert exists
      ansible.builtin.assert:
        that: verify_rh_cert.stat.exists
        fail_msg: "Red Hat CA cert not deployed"
