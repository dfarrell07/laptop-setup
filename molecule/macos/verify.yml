---
- name: Verify (macOS)
  hosts: all
  gather_facts: true

  tasks:
    # --- Shared assertions (all platforms) ---
    - name: Include common verify assertions
      ansible.builtin.include_tasks: ../shared/verify-common.yml

    # --- macOS-specific ---
    - name: Check tmux is installed
      ansible.builtin.command: tmux -V
      changed_when: false

    - name: Check jq is installed
      ansible.builtin.command: jq --version
      changed_when: false

    - name: Check fzf is installed
      ansible.builtin.command: fzf --version
      changed_when: false

    - name: Check direnv is installed
      ansible.builtin.command: direnv version
      changed_when: false

    - name: Check zoxide is installed
      ansible.builtin.command: zoxide --version
      changed_when: false

    - name: Check gh CLI is installed
      ansible.builtin.command: gh --version
      changed_when: false

    - name: Check go is installed
      ansible.builtin.command: go version
      changed_when: false

    - name: Check shellcheck is installed
      ansible.builtin.command: shellcheck --version
      changed_when: false

    - name: Verify SSH sockets directory exists (macOS ControlPath)
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.ssh/sockets"
      register: verify_ssh_sockets

    - name: Assert SSH sockets directory exists
      ansible.builtin.assert:
        that: verify_ssh_sockets.stat.isdir
        fail_msg: "SSH sockets directory missing for macOS ControlPath"

    # --- Desktop role (macOS) ---
    - name: Verify AeroSpace config deployed
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.config/aerospace/aerospace.toml"
      register: verify_aerospace

    - name: Assert AeroSpace config exists
      ansible.builtin.assert:
        that: verify_aerospace.stat.exists
        fail_msg: "AeroSpace config not deployed"
