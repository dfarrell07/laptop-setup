---
driver:
  name: default

platforms:
  - name: macos-instance
    managed: false

provisioner:
  name: ansible
  connection_options:
    ansible_connection: local
  env:
    ANSIBLE_VAULT_PASSWORD_FILE: /dev/null
  config_options:
    defaults:
      vault_password_file: /dev/null
  inventory:
    host_vars:
      macos-instance:
        ansible_connection: local
        ansible_python_interpreter: "{{ ansible_playbook_python }}"

verifier:
  name: ansible

scenario:
  test_sequence:
    - dependency
    - converge
    - verify
