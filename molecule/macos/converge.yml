---
- name: Converge (macOS)
  hosts: all
  gather_facts: true
  become: false

  pre_tasks:
    - name: Load configuration
      ansible.builtin.include_vars: "{{ lookup('env', 'MOLECULE_PROJECT_DIRECTORY') }}/default.config.yml"

    - name: Override profile
      ansible.builtin.set_fact:
        profile: personal

  roles:
    - role: common
    - role: packages
    - role: dotfiles
    - role: ssh
    - role: git_repos
    - role: notes
      vars:
        notes_transcrypt_password: ""
    - role: containers
    - role: desktop
    - role: claude
      vars:
        claude_install_method: skip
