---
- name: Verify (Fedora)
  hosts: all
  gather_facts: true

  tasks:
    # --- Shared assertions (all platforms) ---
    - name: Include common verify assertions
      ansible.builtin.include_tasks: ../shared/verify-common.yml

    # --- Shared assertions (dnf platforms) ---
    - name: Include dnf verify assertions
      ansible.builtin.include_tasks: ../shared/verify-dnf.yml

    # --- Fedora-specific: package checks ---
    - name: Check vim is installed
      ansible.builtin.command: vim --version
      changed_when: false

    - name: Check curl is installed
      ansible.builtin.command: curl --version
      changed_when: false

    # --- Desktop role ---
    - name: Verify Alacritty config deployed
      ansible.builtin.stat:
        path: "{{ ansible_user_dir }}/.config/alacritty/alacritty.toml"
      register: verify_alacritty

    - name: Assert Alacritty config exists
      ansible.builtin.assert:
        that: verify_alacritty.stat.exists
        fail_msg: "Alacritty config not deployed"

    - name: Verify Chrome policy deployed
      ansible.builtin.stat:
        path: /etc/opt/chrome/policies/managed/security.json
      register: verify_chrome

    - name: Assert Chrome policy exists
      ansible.builtin.assert:
        that: verify_chrome.stat.exists
        fail_msg: "Chrome security policy not deployed"

    - name: Validate Chrome policy JSON
      ansible.builtin.command:
        cmd: "python3 -c \"import json; json.load(open('/etc/opt/chrome/policies/managed/security.json'))\""
      changed_when: false
