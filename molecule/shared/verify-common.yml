---
# molecule/shared/verify-common.yml
# Universal assertions that should pass on every platform.
# Include from each scenario's verify.yml via include_tasks.

- name: Check git is installed
  ansible.builtin.command: git --version
  changed_when: false

# --- Dotfiles ---
- name: Verify .zshrc exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.zshrc"
  register: verify_zshrc

- name: Assert .zshrc exists
  ansible.builtin.assert:
    that: verify_zshrc.stat.exists
    fail_msg: ".zshrc was not deployed"

- name: Verify .gitconfig exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.gitconfig"
  register: verify_gitconfig

- name: Assert .gitconfig exists
  ansible.builtin.assert:
    that: verify_gitconfig.stat.exists
    fail_msg: ".gitconfig was not deployed"

- name: Verify .tmux.conf exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.tmux.conf"
  register: verify_tmux

- name: Assert .tmux.conf exists
  ansible.builtin.assert:
    that: verify_tmux.stat.exists
    fail_msg: ".tmux.conf was not deployed"

- name: Verify .vimrc exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.vimrc"
  register: verify_vimrc

- name: Assert .vimrc exists
  ansible.builtin.assert:
    that: verify_vimrc.stat.exists
    fail_msg: ".vimrc was not deployed"

- name: Verify bashrc deployed
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.bashrc"
  register: verify_bashrc

- name: Assert bashrc exists
  ansible.builtin.assert:
    that: verify_bashrc.stat.exists
    fail_msg: ".bashrc was not deployed"

# --- SSH ---
- name: Verify SSH config exists with correct permissions
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.ssh/config"
  register: verify_ssh_config

- name: Assert SSH config exists and is 0600
  ansible.builtin.assert:
    that:
      - verify_ssh_config.stat.exists
      - verify_ssh_config.stat.mode == '0600'
    fail_msg: "SSH config missing or wrong permissions"

- name: Verify SSH directory permissions
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.ssh"
  register: verify_ssh_dir

- name: Assert SSH directory is 0700
  ansible.builtin.assert:
    that: verify_ssh_dir.stat.mode == '0700'
    fail_msg: "SSH directory has wrong permissions"

# --- Git security ---
- name: Check git core.fsmonitor
  ansible.builtin.command: git config --global core.fsmonitor
  register: verify_fsmonitor
  changed_when: false

- name: Assert git core.fsmonitor is false
  ansible.builtin.assert:
    that: verify_fsmonitor.stdout == 'false'
    fail_msg: "git core.fsmonitor is not set to false"

- name: Check git core.hooksPath
  ansible.builtin.command: git config --global core.hooksPath
  register: verify_hooks_path
  changed_when: false

- name: Assert core.hooksPath is set
  ansible.builtin.assert:
    that: "'hooks' in verify_hooks_path.stdout"
    fail_msg: "git core.hooksPath not configured"

- name: Check git push.autoSetupRemote
  ansible.builtin.command: git config --global push.autoSetupRemote
  register: verify_auto_remote
  changed_when: false

- name: Assert push.autoSetupRemote is true
  ansible.builtin.assert:
    that: verify_auto_remote.stdout == 'true'
    fail_msg: "git push.autoSetupRemote not set"

- name: Check git commit.gpgsign
  ansible.builtin.command: git config --global commit.gpgsign
  register: verify_gpgsign
  changed_when: false

- name: Assert commit.gpgsign is true
  ansible.builtin.assert:
    that: verify_gpgsign.stdout == 'true'
    fail_msg: "git commit.gpgsign not enabled"

- name: Check git safe.bareRepository setting
  ansible.builtin.command: git config --global safe.bareRepository
  register: verify_bare_repo
  changed_when: false

- name: Assert git safe.bareRepository is explicit
  ansible.builtin.assert:
    that: verify_bare_repo.stdout == 'explicit'
    fail_msg: "git safe.bareRepository is not set to explicit"

# --- Directories ---
- name: Verify ~/bin directory exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/bin"
  register: verify_bin_dir

- name: Assert ~/bin exists
  ansible.builtin.assert:
    that: verify_bin_dir.stat.isdir
    fail_msg: "~/bin directory was not created"

- name: Verify git repos base directory exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/src"
  register: verify_repos_dir

- name: Assert git repos base directory exists
  ansible.builtin.assert:
    that: verify_repos_dir.stat.isdir
    fail_msg: "Git repos base directory ~/src was not created"

# --- Claude ---
- name: Verify Claude personal config directory
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.claude-personal"
  register: verify_claude_dir

- name: Assert Claude config directory exists with 0700
  ansible.builtin.assert:
    that:
      - verify_claude_dir.stat.isdir
      - verify_claude_dir.stat.mode == '0700'
    fail_msg: "Claude personal config dir missing or wrong permissions"

- name: Verify Claude settings.json exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.claude-personal/settings.json"
  register: verify_claude_settings

- name: Assert Claude settings.json exists with 0600
  ansible.builtin.assert:
    that:
      - verify_claude_settings.stat.exists
      - verify_claude_settings.stat.mode == '0600'
    fail_msg: "Claude settings.json not deployed or wrong permissions (expected 0600)"

- name: Verify Claude CLAUDE.md deployed
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.claude-personal/CLAUDE.md"
  register: verify_claude_md

- name: Assert Claude CLAUDE.md exists
  ansible.builtin.assert:
    that: verify_claude_md.stat.exists
    fail_msg: "Claude CLAUDE.md not deployed"

# --- Git hooks ---
- name: Verify gitleaks pre-commit hook
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.config/git/template/hooks/pre-commit"
  register: verify_precommit

- name: Assert pre-commit hook is executable
  ansible.builtin.assert:
    that:
      - verify_precommit.stat.exists
      - verify_precommit.stat.executable
    fail_msg: "Gitleaks pre-commit hook missing or not executable"

- name: Verify gh CLI config directory
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.config/gh"
  register: verify_gh_dir

- name: Assert gh config directory exists with 0700
  ansible.builtin.assert:
    that:
      - verify_gh_dir.stat.isdir
      - verify_gh_dir.stat.mode == '0700'
    fail_msg: "gh config directory missing or wrong permissions"

# --- Dotfiles: direnv ---
- name: Verify direnv config exists
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.config/direnv/direnv.toml"
  register: verify_direnv

- name: Assert direnv config deployed
  ansible.builtin.assert:
    that: verify_direnv.stat.exists
    fail_msg: "direnv config not deployed"

# --- Dotfiles: SSH agent (Linux only) ---
- name: Verify SSH agent systemd service deployed
  ansible.builtin.stat:
    path: "{{ ansible_user_dir }}/.config/systemd/user/ssh-agent.service"
  register: verify_ssh_agent
  when: ansible_system == 'Linux'

- name: Assert SSH agent service deployed
  ansible.builtin.assert:
    that: verify_ssh_agent.stat.exists
    fail_msg: "SSH agent systemd user service not deployed"
  when: ansible_system == 'Linux'
