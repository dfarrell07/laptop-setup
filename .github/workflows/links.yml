---
name: Link Check

on:
  schedule:
    - cron: '23 4 * * 0'
  workflow_dispatch:

concurrency:
  group: links
  cancel-in-progress: true

permissions:
  contents: read
  issues: write

jobs:
  links:
    name: Check Markdown Links
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Check links
        uses: lycheeverse/lychee-action@8646ba30535128ac92d33dfc9133794bfdd9b411  # v2.8.0
        with:
          args: >-
            --no-progress
            --exclude-path node_modules
            --exclude-path collections
            --exclude-path .claude
            --exclude 'registry\.redhat\.io'
            --exclude 'code\.engineering\.redhat\.com'
            --exclude 'gitlab\.cee\.redhat\.com'
            --exclude 'internal-git\.example\.com'
            --exclude 'github\.com/dfarrell07/laptop-setup/security'
            '**/*.md'
          fail: true

      - name: Create issue on failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3  # v9.0.0
        with:
          script: |
            const fs = require('fs');
            const body = fs.existsSync('./lychee/out.md')
              ? fs.readFileSync('./lychee/out.md', 'utf8')
              : 'Link check failed. See workflow run for details.';
            const {data: issues} = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              labels: 'documentation',
              state: 'open',
              creator: 'github-actions[bot]'
            });
            const existing = issues.find(i => i.title === 'Broken links detected');
            if (existing) {
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.number,
                body: body
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Broken links detected',
                body: body,
                labels: ['documentation']
              });
            }
