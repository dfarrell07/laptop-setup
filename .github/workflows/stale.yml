---
name: Stale Issue/PR Management

on:
  schedule:
    - cron: '0 0 * * *'

concurrency:
  group: stale
  cancel-in-progress: true

permissions:
  contents: none
  issues: write
  pull-requests: write

jobs:
  stale:
    name: Close Stale Issues and PRs
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Mark stale issues and PRs
        uses: actions/stale@eb5cf3af3ac0a1aa4c9c45633dd1ae542a27a899  # v10.3.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          days-before-issue-stale: 120
          days-before-issue-close: 7
          stale-issue-label: 'stale'
          stale-issue-message: >
            This issue has been inactive for 120 days and will be closed in 7 days
            if there is no further activity. If this issue is still relevant, please
            comment or remove the stale label.
          close-issue-message: >
            This issue was automatically closed due to inactivity.
            If you believe this is still relevant, please reopen it.
          exempt-issue-labels: 'confirmed,security,enhancement'
          days-before-pr-stale: 14
          days-before-pr-close: 7
          stale-pr-label: 'stale'
          stale-pr-message: >
            This PR has been inactive for 14 days and will be closed in 7 days
            if there is no further activity. Please rebase or update if still relevant.
          close-pr-message: >
            This PR was automatically closed due to inactivity.
            If you believe this is still relevant, please reopen and update it.
          exempt-pr-labels: 'confirmed,security,dependencies'
          exempt-draft-pr: true
