---
name: Molecule

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: molecule-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  fedora:
    name: Molecule (Fedora)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install 'molecule>=26,<27' 'molecule-plugins[podman]>=25,<26' 'ansible>=11,<12'

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule Fedora scenario
        run: molecule test -s fedora

  centos:
    name: Molecule (CentOS Stream)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install 'molecule>=26,<27' 'molecule-plugins[podman]>=25,<26' 'ansible>=11,<12'

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule CentOS Stream scenario
        run: molecule test -s centos

  debian:
    name: Molecule (Debian)
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install 'molecule>=26,<27' 'molecule-plugins[podman]>=25,<26' 'ansible>=11,<12'

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule Debian scenario
        run: molecule test -s debian

  macos:
    name: Molecule (macOS)
    runs-on: macos-14
    timeout-minutes: 30
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install test dependencies
        run: pip install 'molecule>=26,<27' 'ansible>=11,<12'

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule macOS scenario
        run: molecule test -s macos
