---
name: Molecule

on:
  push:
    branches: [main]
  pull_request:

permissions: {}

jobs:
  container:
    name: Molecule (Container)
    runs-on: ubuntu-24.04
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: pip install molecule 'molecule-plugins[podman]' ansible

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule container scenario
        run: molecule test -s container

  macos:
    name: Molecule (macOS)
    runs-on: macos-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.x'

      - name: Install test dependencies
        run: pip install molecule ansible

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Run Molecule macOS scenario
        run: molecule test -s macos
