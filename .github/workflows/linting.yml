---
name: Linting

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ansible-lint:
    name: Ansible Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install ansible-lint
        run: pip install -r requirements-test.txt

      - name: Create vault password script for CI
        run: cp scripts/vault-pass-ci.sh scripts/vault-pass.sh

      - name: Run ansible-lint
        run: ansible-lint

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install yamllint
        run: pip install -r requirements-test.txt

      - name: Run yamllint
        run: yamllint --strict .

  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Run shellcheck
        run: |
          shellcheck -S warning scripts/*.sh
          shellcheck -S warning roles/claude/files/*.sh
          shellcheck -S warning .githooks/pre-commit .githooks/commit-msg

      - name: Validate preflight JSON output
        run: bash scripts/preflight.sh --json 2>/dev/null | python3 -c "import json,sys; json.load(sys.stdin)"

      - name: Validate smoke-test JSON output
        run: bash scripts/smoke-test.sh --user-only --json 2>/dev/null | python3 -c "import json,sys; json.load(sys.stdin)"

      - name: Run queue poller unit tests
        run: bash scripts/test-queue-poller.sh

  vault-encryption:
    name: Vault Encryption Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Ensure vault files are encrypted
        run: |
          failed=0
          while IFS= read -r f; do
            # shellcheck disable=SC2016
            if head -1 "$f" | grep -q '^\$ANSIBLE_VAULT'; then
              continue
            fi
            # Allow the placeholder stub (no real secrets)
            if grep -q 'vault_placeholder' "$f" && [ "$(grep -E '^vault_' "$f" | grep -cv 'vault_placeholder')" -eq 0 ]; then
              echo "::notice file=${f}::Vault stub (no real secrets) — OK"
              continue
            fi
            echo "::error file=${f}::Unencrypted vault file: ${f}"
            failed=1
          done < <(find . -name '*vault.yml' -not -path './node_modules/*' -not -path './collections/*')
          exit $failed

  syntax-check:
    name: Ansible Syntax Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.13'
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install Ansible
        run: pip install -r requirements-test.txt

      - name: Install collections
        run: ansible-galaxy collection install -r requirements.yml

      - name: Create vault password script for CI
        run: cp scripts/vault-pass-ci.sh scripts/vault-pass.sh

      - name: Run syntax check
        run: ansible-playbook site.yml --syntax-check

  markdownlint:
    name: Markdown Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run markdownlint
        run: npx markdownlint-cli2 "**/*.md" "#node_modules" "#collections" "#.claude" "#references"

  gitleaks:
    name: Secret Detection
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Download gitleaks
        env:
          GITLEAKS_SHA256: 551f6fc83ea457d62a0d98237cbad105af8d557003051f41f3e7ca7b3f2470eb
        run: |
          curl -sSLO https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz
          echo "${GITLEAKS_SHA256}  gitleaks_8.30.1_linux_x64.tar.gz" | sha256sum -c -
          tar xzf gitleaks_8.30.1_linux_x64.tar.gz gitleaks
          chmod +x gitleaks

      - name: Run gitleaks
        run: ./gitleaks git . --redact

  actionlint:
    name: Action Lint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Download actionlint
        env:
          ACTIONLINT_SHA256: 8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8
        run: |
          curl -sSLO https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "${ACTIONLINT_SHA256}  actionlint_1.7.12_linux_amd64.tar.gz" | sha256sum -c -
          tar xzf actionlint_1.7.12_linux_amd64.tar.gz actionlint
          chmod +x actionlint

      - name: Run actionlint
        run: ./actionlint -color

  zizmor:
    name: Workflow Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          persist-credentials: false

      - name: Download zizmor
        env:
          ZIZMOR_SHA256: aa1facd105f0d83fe5c55b1adcd9d7417de5d83aa27471f91dc0b66cf3803577
        run: |
          curl -sSLO https://github.com/zizmorcore/zizmor/releases/download/v1.25.2/zizmor-x86_64-unknown-linux-gnu.tar.gz
          echo "${ZIZMOR_SHA256}  zizmor-x86_64-unknown-linux-gnu.tar.gz" | sha256sum -c -
          tar xzf zizmor-x86_64-unknown-linux-gnu.tar.gz zizmor
          chmod +x zizmor

      - name: Run zizmor
        run: ./zizmor .github/workflows/

  commitlint:
    name: Commit Message Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    if: github.event_name == 'pull_request' && github.actor != 'dependabot[bot]'
    steps:
      - name: Check out the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6.0.3
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020  # v4.4.0
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run commitlint
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: npx commitlint --from "$BASE_SHA" --to "$HEAD_SHA"

      - name: Check imperative mood
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          failed=0
          for sha in $(git rev-list "$BASE_SHA".."$HEAD_SHA"); do
            msg=$(git log -1 --format=%s "$sha")
            first=$(echo "$msg" | awk '{print $1}')
            if ! echo "$msg" | grep -qE '^[A-Z]'; then
              echo "::error::Commit $sha: Subject must start with a capital letter"
              failed=1
            fi
            case "$first" in
              Added|Changed|Created|Deleted|Enabled|Disabled|Expanded|\
              Fixed|Implemented|Improved|Merged|Moved|Refactored|\
              Removed|Renamed|Replaced|Resolved|Reverted|Started|\
              Stopped|Updated|Upgraded|\
              Adding|Changing|Creating|Deleting|Enabling|Disabling|\
              Expanding|Fixing|Implementing|Improving|Merging|Moving|\
              Refactoring|Removing|Renaming|Replacing|Resolving|\
              Reverting|Starting|Stopping|Updating|Upgrading)
                echo "::error::Commit $sha: Use imperative mood, not '$first'"
                failed=1 ;;
            esac
          done
          exit $failed
